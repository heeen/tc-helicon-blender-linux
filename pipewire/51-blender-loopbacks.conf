# Load the Blender dynamic loopback script as a WirePlumber component.
# The script creates/destroys 6 stereo virtual sources whenever the
# TC Helicon Blender USB audio interface is plugged in or removed.

wireplumber.components = [
  {
    name     = blender-loopbacks.lua
    type     = script/lua
    provides = custom.blender-loopbacks
  }
]

wireplumber.profiles = {
  main = {
    custom.blender-loopbacks = required
  }
}
