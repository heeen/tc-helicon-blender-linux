# TC Helicon Blender — split 12ch capture into 6 stereo input pairs
# and expose 2ch playback as named output.
#
# Channels map to physical stereo jacks:
#   AUX0/AUX1  = Input 1    AUX6/AUX7   = Input 4
#   AUX2/AUX3  = Input 2    AUX8/AUX9   = Input 5
#   AUX4/AUX5  = Input 3    AUX10/AUX11 = Input 6

context.modules = [
  # --- Input 1 ---
  { name = libpipewire-module-loopback
    args = {
      node.description = "Blender Input 1"
      capture.props = {
        node.name        = "blender_capture_1"
        audio.position   = [ AUX0 AUX1 ]
        stream.dont-remix = true
        target.object    = "alsa_input.usb-TC-Helicon_Blender_10400041-00.multichannel-input"
        node.passive     = true
      }
      playback.props = {
        node.name        = "blender_input_1"
        media.class      = "Audio/Source"
        audio.position   = [ FL FR ]
        node.description = "Blender Input 1"
      }
    }
  }

  # --- Input 2 ---
  { name = libpipewire-module-loopback
    args = {
      node.description = "Blender Input 2"
      capture.props = {
        node.name        = "blender_capture_2"
