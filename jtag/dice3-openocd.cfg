# TC Applied Technologies DICE3 (ARM926EJ-S) — OpenOCD config
# JTAG IDCODE: 0x17900F0F, 4-bit IR
#
# Usage:
#   openocd -f dice3-openocd.cfg
#
# Then in another terminal:
#   telnet localhost 4444
#   > halt
#   > dump_image blender_firmware.bin 0x00000000 0x100000

# --- Adapter: FT232R bit-bang JTAG ---
# Pin mapping: TXD=TCK, RXD=TDI, RTS=TDO, CTS=TMS
adapter driver ft232r
ft232r vid_pid 0x0403 0x6001
transport select jtag

# --- Common ---
adapter speed 500
reset_config none

# --- TAP ---
jtag newtap dice3 cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id 0x17900f0f

# --- Target ---
target create dice3.cpu arm926ejs -endian little -chain-position dice3.cpu
dice3.cpu configure -work-area-phys 0x00031500 -work-area-size 0x0400 -work-area-backup 1

init
