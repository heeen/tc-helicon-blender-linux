# TC Applied Technologies DICE3 (ARM926EJ-S) — OpenOCD via MioLink
# MioLink supports CMSIS-DAP interface for OpenOCD
#
# Usage:
#   openocd -f jtag/miolink-dice3-openocd.cfg
#   gdb-multiarch -ex "target extended-remote localhost:3333"

# --- Adapter: MioLink via CMSIS-DAP ---
adapter driver cmsis-dap
transport select jtag
adapter speed 10000

# --- TAP ---
# DICE3 ARM926EJ-S: IDCODE 0x17900F0F, 4-bit IR
jtag newtap dice3 cpu -irlen 4 -ircapture 0x1 -irmask 0xf -expected-id 0x17900f0f

# --- Target ---
target create dice3.cpu arm926ejs -endian little -chain-position dice3.cpu
dice3.cpu configure -work-area-phys 0x00031500 -work-area-size 0x0400 -work-area-backup 1

# nRST on MioLink GP7 — available but not used during normal connect.
# Use `reset run` explicitly when needed. connect_assert_srst would
# reset the device on every OpenOCD session, breaking SRAM injection.
reset_config none

init
